<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버튼 클릭 이력 테스트</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* 아이템이 추가되어도 상단은 고정 */
            align-items: center;
            min-height: 100vh;
            padding-top: 15vh; /* 화면 위쪽에서 일정 간격 띄움 */
            overflow: hidden;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 600;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .button-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .btn:active { transform: translateY(1px); }

        .btn:nth-child(1):hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 0 15px rgba(244, 63, 94, 0.4); }
        .btn:nth-child(2):hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 0 15px rgba(16, 185, 129, 0.4); }
        .btn:nth-child(3):hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 0 15px rgba(139, 92, 246, 0.4); }

        /* 클릭 이력이 표시될 컨테이너 */
        #history-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            /* 높이를 제한하고 넘어갈 경우 스크롤 생성 */
            max-height: 50vh; 
            overflow-y: auto;
            padding: 10px;
        }
        
        /* 커스텀 스크롤바 디자인 */
        #history-container::-webkit-scrollbar { width: 8px; }
        #history-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        #history-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        #history-container::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .empty-msg {
            text-align: center;
            color: #64748b;
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        /* 개별 클릭 기록 카드 */
        .log-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 1.1rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            /* 최신 카드가 톡 튀어나오는 애니메이션 */
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .highlight {
            font-weight: 600;
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <h1>어떤 버튼을 클릭하시겠습니까?</h1>

    <div class="button-container">
        <button class="btn" onclick="handleClick('첫 번째 버튼 (btn-1)')">버튼 1</button>
        <button class="btn" onclick="handleClick('두 번째 버튼 (btn-2)')">버튼 2</button>
        <button class="btn" onclick="handleClick('세 번째 버튼 (btn-3)')">버튼 3</button>
    </div>

    <!-- 이력이 쌓이는 영역 -->
    <div id="history-container">
        <div class="empty-msg" id="empty-msg">버튼을 클릭하면 이곳에 이력이 쌓입니다.</div>
    </div>

    <script>
        function handleClick(buttonInfo) {
            const container = document.getElementById('history-container');
            const emptyMsg = document.getElementById('empty-msg');
            
            // 최초 안내 메시지가 있다면 제거
            if (emptyMsg) {
                emptyMsg.remove();
            }

            const now = new Date();
            const timeString = now.toLocaleTimeString('ko-KR', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                fractionalSecondDigits: 3 
            });

            // 새 로그 엘리먼트 생성
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.innerHTML = `<span class="highlight">${buttonInfo}</span> 클릭 완료<br>
                                 <span style="font-size: 0.85rem; color: #94a3b8; margin-top: 6px; display: block;">⏰ ${timeString}</span>`;
            
            // 최신 클릭 내역이 가장 위로 오도록 prepend 사용
            container.prepend(logItem);
        }
    </script>

</body>
</html>
